<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>アンケート管理</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="admin-shell">
      <section id="loginPanel" class="form-card admin-login">
        <div class="accent-bar"></div>
        <p class="eyebrow">管理者ページ</p>
        <h1>結果確認</h1>
        <form id="loginForm" class="compact-form">
          <label class="field-label" for="password">管理者パスワード</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required />
          <button class="primary-button" type="submit">ログイン</button>
          <p id="loginMessage" class="message" aria-live="polite"></p>
        </form>
      </section>

      <section id="adminPanel" class="admin-panel hidden">
        <header class="admin-header">
          <div>
            <p class="eyebrow">管理者ページ</p>
            <h1>評価結果</h1>
          </div>
          <div class="admin-actions">
            <a id="csvLink" class="secondary-button" href="#">CSV</a>
            <button id="refreshButton" class="secondary-button" type="button">更新</button>
          </div>
        </header>

        <section class="form-card">
          <h2>メディア</h2>
          <form id="sampleForm" class="upload-grid">
            <label>
              <span class="field-label">表示名</span>
              <input name="title" type="text" placeholder="例: Sample 01" required />
            </label>
            <label>
              <span class="field-label">mp3 / mov</span>
              <input name="media" type="file" accept=".mp3,.mov,.mp4,.wav,.m4a,.webm,audio/*,video/*" required />
            </label>
            <button class="primary-button" type="submit">追加</button>
          </form>
          <p id="sampleMessage" class="message" aria-live="polite"></p>
          <div id="sampleList" class="sample-list"></div>
        </section>

        <section class="metrics-grid" aria-label="集計"></section>

        <section class="form-card">
          <h2>回答一覧</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日時</th>
                  <th>回答者</th>
                  <th>所属</th>
                  <th>メディア</th>
                  <th>合成品質</th>
                  <th>音色</th>
                  <th>コメント</th>
                </tr>
              </thead>
              <tbody id="responseRows"></tbody>
            </table>
          </div>
          <p id="emptyResults" class="empty-state hidden">回答はまだありません。</p>
        </section>
      </section>
    </main>

    <script src="/admin.js" defer></script>
  </body>
</html>
