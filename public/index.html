<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>合成音評価アンケート</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="form-shell">
      <section class="form-card form-hero">
        <div class="accent-bar"></div>
        <p class="eyebrow">評価会アンケート</p>
        <h1>合成音評価</h1>
        <p class="lead">各メディアを再生して、合成品質と音色を 5 段階で評価してください。</p>
      </section>

      <form id="surveyForm" class="survey-form" novalidate>
        <section class="form-card">
          <label class="field-label" for="evaluator">回答者名</label>
          <input id="evaluator" name="evaluator" type="text" autocomplete="name" placeholder="任意" />

          <label class="field-label" for="group">所属・チーム</label>
          <input id="group" name="group" type="text" placeholder="任意" />
        </section>

        <div id="samples" class="samples"></div>

        <section class="form-card submit-card">
          <p id="formMessage" class="message" aria-live="polite"></p>
          <button id="submitButton" class="primary-button" type="submit">送信</button>
        </section>
      </form>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
